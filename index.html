<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Quiz</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --accent-color: #4fc3f7;
            --background-color: #f8f9fa;
            --text-color: #333;
            --light-text: #ffffff;
            --success-color: #4caf50;
            --error-color: #f44336;
            --border-radius: 12px;
            --box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--light-text);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .theme-card {
            background: var(--light-text);
            border-radius: var(--border-radius);
            padding: 25px;
            width: 200px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--box-shadow);
            border: 3px solid transparent;
        }

        .theme-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .theme-card.selected {
            border-color: var(--accent-color);
            background: #f0f8ff;
        }

        .theme-card h3 {
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .theme-card p {
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .quiz-container {
            background: var(--light-text);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--box-shadow);
            margin-bottom: 20px;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--secondary-color);
            text-align: center;
            line-height: 1.5;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .option {
            background: var(--background-color);
            border: 2px solid var(--primary-color);
            border-radius: var(--border-radius);
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-size: 1.1rem;
        }

        .option:hover {
            background: #e3f2fd;
            border-color: var(--secondary-color);
        }

        .option.selected {
            background: var(--accent-color);
            color: var(--light-text);
            border-color: var(--accent-color);
        }

        .option.correct {
            background: var(--success-color);
            color: var(--light-text);
            border-color: var(--success-color);
        }

        .option.incorrect {
            background: var(--error-color);
            color: var(--light-text);
            border-color: var(--error-color);
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
        }

        .feedback.correct {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success-color);
            display: block;
        }

        .feedback.incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: var(--error-color);
            display: block;
        }

        .score-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .progress-bar {
            height: 10px;
            background: var(--background-color);
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            background: var(--primary-color);
            color: var(--light-text);
            border: none;
            border-radius: var(--border-radius);
            padding: 12px 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--box-shadow);
        }

        button:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            text-align: center;
            display: none;
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--secondary-color);
        }

        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .result-feedback {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--text-color);
        }

        .result-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .image-question {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius);
            margin: 20px auto;
            display: block;
            box-shadow: var(--box-shadow);
        }

        .back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--secondary-color);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            color: var(--light-text);
            text-decoration: none;
            font-size: 1rem;
            box-shadow: var(--box-shadow);
            transition: all 0.2s ease;
        }

        .back-button:hover {
            background: var(--primary-color);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .theme-card {
                width: 150px;
                padding: 15px;
            }
            .theme-card h3 {
                font-size: 1.1rem;
            }
            .options {
                grid-template-columns: 1fr;
            }
            .question {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; left: 20px">
      <a href="https://pierreg78-maker.github.io/Atelier/" style="display: inline-block; padding: 6px 10px; background-color: #6BA3FF; color: white; text-decoration: none; border-radius: 50px; font-family: Arial, sans-serif; font-size: 10px; font-weight: normal; text-align: center; position: absolute; top: 20px; left: 20px;">
    Retour à l'accueil
      </a>
    </div>
    <header>
        <h1>🎤 Le Quiz </h1>
        <p class="subtitle">Testez vos connaissances sur les années 60-80, le Périgord et le cinéma populaire.</p>
    </header>

    <div class="container">
        <div class="theme-selector" id="themeSelector">
            <div class="theme-card" onclick="selectTheme('musique')">
                <h3>🎵 Musique</h3>
                <p>Années 60-70-80</p>
            </div>
            <div class="theme-card" onclick="selectTheme('perigord')">
                <h3>🏞️ Périgord</h3>
                <p>Histoire & Culture</p>
            </div>
            <div class="theme-card" onclick="selectTheme('cinema')">
                <h3>🎬 Cinéma</h3>
                <p>Films populaires</p>
            </div>
        </div>

        <div class="quiz-container" id="quizContainer" style="display: none;">
            <div class="score-container">
                <span>Question <span id="questionNumber">1</span>/<span id="totalQuestions">10</span></span>
                <span>Score: <span id="currentScore">0</span>/<span id="maxScore">10</span></span>
            </div>

            <div class="progress-bar">
                <div class="progress" id="progressBar" style="width: 0%"></div>
            </div>

            <div class="question-container">
                <h2 class="question" id="questionText"></h2>
                <img class="image-question" id="questionImage" style="display: none;">
                <div class="options" id="optionsContainer"></div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="controls">
                <button id="nextButton" onclick="nextQuestion()" disabled>Suivant →</button>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <h2 class="result-title">Félicitations !</h2>
            <div class="result-score" id="finalScore">0/10</div>
            <div class="result-feedback" id="resultFeedback"></div>
            <div class="result-actions">
                <button onclick="restartQuiz()">Recommencer</button>
                <button onclick="backToThemes()">Changer de thème</button>
            </div>
        </div>

        <a href="#" class="back-button" id="backButton" onclick="backToThemes()" style="display: none;">← Retour aux thèmes</a>
    </div>

    <script>
        const quizzes = {
            musique: [
                { question: "Quel chanteur français ou chanteuse française est célèbre pour 'La vie en rose' ?", options: ["Charles Aznavour", "Johnny Hallyday", "Édith Piaf", "Joe Dassin"], correct: 2 },
                { question: "Quel groupe a chanté 'Bohemian Rhapsody' ?", options: ["The Beatles", "Queen", "Pink Floyd", "The Rolling Stones"], correct: 1 },
                { question: "Qui a chanté le tube des années 70 qui commence par : 'Je t'aime... moi non plus' ?", options: ["Dalida", "Charles Aznavour", "Serge Gainsbourg & Jane Birkin", "Françoise Hardy"], correct: 2 },
                { question: "De quel instrument jouait Django Reinhardt ?", options: ["Violon", "Guitare", "Accordéon", "Piano"], correct: 1 },
                { question: "Quel artiste a popularisé le 'Twist' en France ?", options: ["Chubby Checker", "Elvis Presley", "Johnny Hallyday", "Cliff Richard"], correct: 2 },
                { question: "Quelle comédie musicale a été écrite par Michel Berger et Luc Plamandon ?", options: ["Le Roi Lion", "Notre Dame de Paris", "Hair", "Starmania"], correct: 3 },
                { question: "Qui a chanté 'Ne me quitte pas' ?", options: ["Charles Trenet", "Jacques Brel", "Georges Brassens", "Leo Ferré"], correct: 1 },
                { question: "Quel groupe a chanté 'Sweet Child O'Mine' ?", options: ["AC/DC", "Bon Jovi", "Metallica","Guns N' Roses"], correct: 3 },
                { question: "Quel est le titre de la chanson de Joe Dassin qui commence par 'on ira, où tu voudras quand tu voudras ?'", options: ["'Les Champs-Élysées'", "'L'Été indien'", "'Ça va pas changer le monde'", "'Salut les copains'"], correct: 1 },
                { question: "Quel chanteur est surnommé 'le Elvis français' ?", options: ["Eddy Mitchell", "Dick Rivers","Johnny Hallyday", "Vince Taylor"], correct: 2 }
            ],

            perigord: [
                { question: "Quel est le nom de la rivière qui traverse Périgueux ?", options: ["La Garonne", "La Dordogne", "La Loire", "L'Isle"], correct: 3 },
                { question: "Quelle est la spécialité culinaire du Périgord à base de pommes de terre ?", options: ["Truffade", "Pommes sarladaises", "La quiche", "L'aligot"], correct: 1 },
                { question: "Quel célèbre site préhistorique se trouve en Dordogne ?", options: ["Cosquer", "Niaux", "Lascaux", "Chauvet"], correct: 2 },
                { question: "Quel est le nom de la ville du Périgord où La Boétie habita ?", options: ["Bordeaux", "Limoges", "Sarlat", "Périgueux"], correct: 2 },
                { question: "Quel est le nom du célèbre marché de Sarlat ?", options: ["Marché des Halles", "Marché Saint-Pierre", "Marché de la Liberté", "Marché Notre-Dame"], correct: 1 },
                { question: "Quel produit AOP est typique du Périgord ?", options: ["La Pomme", "Le Fromage de chèvre", "La Noix du Périgord", "La Truffe blanche"], correct: 2 },
                { question: "Quel architecte a dessiné les plans de Vesunna à Périgueux ?", options: ["Ch.de Portzamparc", "Rudy Ricciotti", "Renzo Piano", "Jean Nouvel"], correct: 3 },
                { question: "Quel est le champignon emblématique du Périgord ?", options: ["Le cèpe", "La truffe noire", "La girolle", "Le mousseron"], correct: 1 },
                { question: "De quel peuple gaulois vient le nom de Périgord ?", options: ["Les Périceltes", "Les Pétrocores", "Les Bituriges", "Les Eburons"], correct: 1 },
                { question: "Comment appelle-t-on les habitants de Saint-Astier  ?", options: ["Les Asterix", "Les Saint-Astierins", "Les Astériens", "Les Astérois"], correct: 2 }
            ],

            cinema: [
                { question: "Quel acteur joue dans 'La Grande Vadrouille' ?", options: ["Jean Marais", "Louis de Funès", "Jean Gabin", "J.-P. Belmondo"], correct: 1 },
                { question: "Quel film met en scène Fernandel ?", options: ["Le Petit Monde de Don Camillo", "La Strada", "Le Guépard", "Hier, aujourd'hui et demain"], correct: 0 },
                { question: "Quel réalisateur a fait 'Les Parapluies de Cherbourg' ?", options: ["Jean-Luc Godard", "François Truffaut", "Jacques Demy", "Claude Chabrol"], correct: 2 },
                { question: "Quel acteur français est l'as des as ?", options: ["Gérard Depardieu", "Alain Delon", "Louis de Funès", "Jean-Paul Belmondo"], correct: 3 },
                { question: "Quel film français a remporté la Palme d'Or en 1987 ?", options: ["'Sous le soleil de Satan'", "'Paris, Texas'", "'La Nuit de Varennes'", "'Le Dernier Empereur'"], correct: 0 },
                { question: "Quel est le nom du personnage joué par Coluche dans 'L'Aile ou la Cuisse' ?", options: ["Jacques Tricatel", "Charles Duchemin", "Gérard Duchemin", "Fernand Naudin"], correct: 2 },
                { question: "Quel film met en scène la chanson 'Les Copains d'abord' ?", options: ["'Les Aventures de Rabbi Jacob'", "'Les Charlots en délire'", "'Les amis d'avant'", "'Les Copains'"], correct: 3 },
                { question: "Quel est ce film célèbre des années 60, qui se termine par un duel à trois ?", options: ["'Le Bon, la Brute et le Truand'", "'Il était une fois dans l'Ouest'", "'La Mort aux trousses'", "'Ben-Hur'"], correct: 0 },
                { question: "Quel acteur joue le rôle de Fantômas dans les films des années 60 ?", options: ["Louis de Funès", "Jean Marais", "Bourvil", "Pierre Richard"], correct: 1 },
                { question: "Qui accoompagne Pierre Richard dans 'la Chèvre' ?", options: ["Victor Lanoux", "Jean-François Balmer", "Jean-Pierre Castaldi", "Gérad Depardieu"], correct: 3 }
            ]
        };

        let currentTheme = null;
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;
        let answerSubmitted = false;

        function selectTheme(theme) {
            currentTheme = theme;
            currentQuestions = [...quizzes[theme]].sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            score = 0;
            selectedOption = null;
            answerSubmitted = false;

            document.getElementById('themeSelector').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('backButton').style.display = 'block';
            displayQuestion();
        }

        function displayQuestion() {
            answerSubmitted = false;
            selectedOption = null;

            const question = currentQuestions[currentQuestionIndex];
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('questionImage').style.display = 'none';
            document.getElementById('optionsContainer').innerHTML = '';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextButton').disabled = true;

            if (question.type === 'image') {
                document.getElementById('questionImage').src = question.image;
                document.getElementById('questionImage').style.display = 'block';
            }

            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.textContent = option;
                optionElement.onclick = () => selectOption(index, optionElement);
                document.getElementById('optionsContainer').appendChild(optionElement);
            });

            document.getElementById('questionNumber').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = currentQuestions.length;
            document.getElementById('currentScore').textContent = score;
            document.getElementById('maxScore').textContent = currentQuestions.length;

            const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function selectOption(index, element) {
            if (answerSubmitted) return;
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            selectedOption = index;
            element.classList.add('selected');
            document.getElementById('nextButton').disabled = false;
        }

        function nextQuestion() {
            if (selectedOption === null || answerSubmitted) return;
            answerSubmitted = true;
            const question = currentQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');

            if (selectedOption === question.correct) {
                score++;
                options[selectedOption].classList.add('correct');
                feedback.textContent = "Bravo ! C'est la bonne réponse.";
                feedback.className = "feedback correct";
            } else {
                options[selectedOption].classList.add('incorrect');
                options[question.correct].classList.add('correct');
                feedback.textContent = `Dommage ! La bonne réponse était : ${question.options[question.correct]}`;
                feedback.className = "feedback incorrect";
            }

            feedback.style.display = 'block';
            document.getElementById('currentScore').textContent = score;

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < currentQuestions.length) {
                    displayQuestion();
                } else {
                    showResults();
                }
            }, 2000);
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';
            const finalScore = document.getElementById('finalScore');
            const resultFeedback = document.getElementById('resultFeedback');
            finalScore.textContent = `${score}/${currentQuestions.length}`;

            const percentage = (score / currentQuestions.length) * 100;
            if (percentage === 100) {
                resultFeedback.textContent = "Parfait ! Vous êtes un vrai expert !";
            } else if (percentage >= 70) {
                resultFeedback.textContent = "Excellent ! Vous connaissez très bien ce thème.";
            } else if (percentage >= 50) {
                resultFeedback.textContent = "Bien joué ! Vous avez de bonnes connaissances.";
            } else {
                resultFeedback.textContent = "Pas mal ! Vous pouvez retenter pour améliorer votre score.";
            }
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            selectedOption = null;
            answerSubmitted = false;
            displayQuestion();
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
        }

        function backToThemes() {
            document.getElementById('themeSelector').style.display = 'flex';
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('backButton').style.display = 'none';
        }
    </script>
</body>
</html>
